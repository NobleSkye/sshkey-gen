<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SSH Config Generator</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, sans-serif;
                background: #1a1a2e;
                color: #eee;
                min-height: 100vh;
                padding: 2rem;
            }

            .container {
                max-width: 900px;
                margin: 0 auto;
            }

            h1 {
                text-align: center;
                margin-bottom: 2rem;
                color: #00d9ff;
            }

            .section {
                background: #16213e;
                border-radius: 12px;
                padding: 1.5rem;
                margin-bottom: 1.5rem;
            }

            h2 {
                color: #00d9ff;
                margin-bottom: 1rem;
                font-size: 1.2rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            label {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-bottom: 0.5rem;
                font-weight: 500;
            }

            .help-icon {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 18px;
                height: 18px;
                border-radius: 50%;
                background: #0f3460;
                color: #00d9ff;
                font-size: 12px;
                cursor: help;
                position: relative;
            }

            .help-icon:hover::after {
                content: attr(data-tooltip);
                position: absolute;
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%);
                background: #0f3460;
                color: #fff;
                padding: 0.5rem 0.75rem;
                border-radius: 6px;
                font-size: 12px;
                font-weight: normal;
                white-space: nowrap;
                z-index: 100;
                margin-bottom: 5px;
            }

            input,
            select {
                width: 100%;
                padding: 0.75rem;
                border: 1px solid #0f3460;
                border-radius: 6px;
                background: #1a1a2e;
                color: #eee;
                font-size: 1rem;
            }

            input:focus,
            select:focus {
                outline: none;
                border-color: #00d9ff;
            }

            .host-entries {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }

            .host-entry {
                background: #0f3460;
                padding: 1rem;
                border-radius: 8px;
                position: relative;
            }

            .host-entry h3 {
                font-size: 0.9rem;
                color: #00d9ff;
                margin-bottom: 0.75rem;
            }

            .host-entry .remove-btn {
                position: absolute;
                top: 0.75rem;
                right: 0.75rem;
                background: #e94560;
                border: none;
                color: white;
                width: 24px;
                height: 24px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 14px;
            }

            .host-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.75rem;
            }

            .add-btn {
                background: #00d9ff;
                color: #1a1a2e;
                border: none;
                padding: 0.75rem 1.5rem;
                border-radius: 6px;
                cursor: pointer;
                font-size: 1rem;
                font-weight: 600;
                width: 100%;
            }

            .add-btn:hover {
                background: #00b8d9;
            }

            .global-section {
                margin-top: 1rem;
                padding-top: 1rem;
                border-top: 1px solid #0f3460;
            }

            .output-section {
                background: #0f3460;
            }

            textarea {
                width: 100%;
                height: 300px;
                background: #1a1a2e;
                color: #0f0;
                font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
                border: none;
                border-radius: 6px;
                padding: 1rem;
                font-size: 0.9rem;
                resize: vertical;
            }

            .commands {
                margin-top: 1rem;
                padding: 1rem;
                background: #1a1a2e;
                border-radius: 6px;
            }

            .commands code {
                display: block;
                color: #00d9ff;
                font-family: monospace;
                margin-bottom: 0.5rem;
            }

            .btn-row {
                display: flex;
                gap: 1rem;
                margin-top: 1rem;
            }

            .copy-btn,
            .download-btn {
                flex: 1;
                padding: 0.75rem;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 1rem;
                font-weight: 600;
            }

            .copy-btn {
                background: #00d9ff;
                color: #1a1a2e;
            }

            .download-btn {
                background: #e94560;
                color: white;
            }

            .settings-group {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.75rem;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>SSH Config Generator</h1>

            <div class="section">
                <h2>Settings</h2>
                <div class="settings-group">
                    <div class="form-group">
                        <label>
                            SSH Directory
                            <span
                                class="help-icon"
                                data-tooltip="Directory where SSH config will be saved"
                                >?</span
                            >
                        </label>
                        <input
                            type="text"
                            id="sshDir"
                            value="~/.ssh"
                            placeholder="~/.ssh"
                        />
                    </div>
                    <div class="form-group">
                        <label>
                            Config Filename
                            <span
                                class="help-icon"
                                data-tooltip="Name of the SSH config file"
                                >?</span
                            >
                        </label>
                        <input
                            type="text"
                            id="configFile"
                            value="config"
                            placeholder="config"
                        />
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Host Entries</h2>
                <div class="host-entries" id="hostEntries"></div>
                <button class="add-btn" onclick="addHost()">+ Add Host</button>

                <div class="global-section">
                    <h2>Global Defaults</h2>
                    <div class="host-row">
                        <div class="form-group">
                            <label>
                                Default User
                                <span
                                    class="help-icon"
                                    data-tooltip="Default username for all hosts"
                                    >?</span
                                >
                            </label>
                            <input
                                type="text"
                                id="defaultUser"
                                placeholder="root"
                                oninput="generate()"
                            />
                        </div>
                        <div class="form-group">
                            <label>
                                Default Port
                                <span
                                    class="help-icon"
                                    data-tooltip="Default SSH port"
                                    >?</span
                                >
                            </label>
                            <input
                                type="text"
                                id="defaultPort"
                                placeholder="22"
                                oninput="generate()"
                            />
                        </div>
                    </div>
                    <div class="host-row">
                        <div class="form-group">
                            <label>
                                LogLevel
                                <span
                                    class="help-icon"
                                    data-tooltip="SSH logging level (QUIET, FATAL, ERROR, INFO, VERBOSE, DEBUG, DEBUG1, DEBUG2, DEBUG3)"
                                    >?</span
                                >
                            </label>
                            <input
                                type="text"
                                id="logLevel"
                                placeholder="INFO"
                                oninput="generate()"
                            />
                        </div>
                        <div class="form-group">
                            <label>
                                Compression
                                <span
                                    class="help-icon"
                                    data-tooltip="Enable compression (yes/no)"
                                    >?</span
                                >
                            </label>
                            <select id="compression" onchange="generate()">
                                <option value="">Default</option>
                                <option value="yes">Yes</option>
                                <option value="no">No</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section output-section">
                <h2>Generated Config</h2>
                <textarea id="output" readonly></textarea>

                <div class="commands">
                    <strong>Commands to run:</strong>
                    <code id="touchCmd">touch ~/.ssh/config</code>
                    <code id="chmodCmd">chmod 600 ~/.ssh/config</code>
                </div>

                <div class="btn-row">
                    <button class="copy-btn" onclick="copyConfig()">
                        Copy Config
                    </button>
                    <button class="download-btn" onclick="downloadConfig()">
                        Download Config
                    </button>
                </div>
            </div>
        </div>

        <script>
            let hostCount = 0;

            function addHost(data = {}) {
                const container = document.getElementById("hostEntries");
                const entry = document.createElement("div");
                entry.className = "host-entry";
                entry.id = `host-${hostCount}`;
                entry.innerHTML = `
                <h3>Host ${hostCount + 1}</h3>
                <button class="remove-btn" onclick="removeHost(${hostCount})">×</button>
                <div class="host-row">
                    <div class="form-group">
                        <label>
                            Host Name
                            <span class="help-icon" data-tooltip="Alias for the connection (can use wildcards like *ell, !martell)">?</span>
                        </label>
                        <input type="text" class="host-name" placeholder="my-server" value="${data.hostName || ""}" oninput="generate()">
                    </div>
                    <div class="form-group">
                        <label>
                            HostName
                            <span class="help-icon" data-tooltip="IP address or hostname to connect to">?</span>
                        </label>
                        <input type="text" class="host-name-addr" placeholder="192.168.1.10" value="${data.hostNameAddr || ""}" oninput="generate()">
                    </div>
                </div>
                <div class="host-row">
                    <div class="form-group">
                        <label>
                            User
                            <span class="help-icon" data-tooltip="Username to connect with">?</span>
                        </label>
                        <input type="text" class="host-user" placeholder="username" value="${data.user || ""}" oninput="generate()">
                    </div>
                    <div class="form-group">
                        <label>
                            Port
                            <span class="help-icon" data-tooltip="SSH port number">?</span>
                        </label>
                        <input type="text" class="host-port" placeholder="22" value="${data.port || ""}" oninput="generate()">
                    </div>
                </div>
                <div class="host-row">
                    <div class="form-group">
                        <label>
                            IdentityFile
                            <span class="help-icon" data-tooltip="Path to SSH private key file">?</span>
                        </label>
                        <input type="text" class="host-identity" placeholder="~/.ssh/keyname.key" value="${data.identityFile || ""}" oninput="generate()">
                    </div>
                    <div class="form-group">
                        <label>
                            Extra Options
                            <span class="help-icon" data-tooltip="Additional SSH options (one per line, format: Option value)">?</span>
                        </label>
                        <input type="text" class="host-extra" placeholder="ForwardAgent yes" value="${data.extra || ""}" oninput="generate()">
                    </div>
                </div>
            `;
                container.appendChild(entry);
                hostCount++;
                generate();
            }

            function removeHost(id) {
                const entry = document.getElementById(`host-${id}`);
                if (entry) entry.remove();
                generate();
            }

            function generate() {
                const sshDir =
                    document.getElementById("sshDir").value || "~/.ssh";
                const configFile =
                    document.getElementById("configFile").value || "config";
                const defaultUser =
                    document.getElementById("defaultUser").value;
                const defaultPort =
                    document.getElementById("defaultPort").value;
                const logLevel = document.getElementById("logLevel").value;
                const compression =
                    document.getElementById("compression").value;

                let config = "";

                document.querySelectorAll(".host-entry").forEach((entry) => {
                    const hostName = entry.querySelector(".host-name").value;
                    const hostNameAddr =
                        entry.querySelector(".host-name-addr").value;
                    const user = entry.querySelector(".host-user").value;
                    const port = entry.querySelector(".host-port").value;
                    const identityFile =
                        entry.querySelector(".host-identity").value;
                    const extra = entry.querySelector(".host-extra").value;

                    if (hostName) {
                        config += `Host ${hostName}\n`;
                        if (hostNameAddr)
                            config += `    HostName ${hostNameAddr}\n`;
                        if (user) config += `    User ${user}\n`;
                        if (port) config += `    Port ${port}\n`;
                        if (identityFile)
                            config += `    IdentityFile ${identityFile}\n`;
                        if (extra) {
                            extra.split("\n").forEach((line) => {
                                if (line.trim())
                                    config += `    ${line.trim()}\n`;
                            });
                        }
                        config += "\n";
                    }
                });

                const globalSettings = [];
                if (defaultUser) globalSettings.push(`User ${defaultUser}`);
                if (defaultPort) globalSettings.push(`Port ${defaultPort}`);
                if (logLevel) globalSettings.push(`LogLevel ${logLevel}`);
                if (compression)
                    globalSettings.push(`Compression ${compression}`);

                if (globalSettings.length > 0) {
                    config += `Host *\n`;
                    globalSettings.forEach((setting) => {
                        config += `    ${setting}\n`;
                    });
                }

                document.getElementById("output").value = config;
                document.getElementById("touchCmd").textContent =
                    `touch ${sshDir}/${configFile}`;
                document.getElementById("chmodCmd").textContent =
                    `chmod 600 ${sshDir}/${configFile}`;
            }

            function copyConfig() {
                const output = document.getElementById("output");
                output.select();
                document.execCommand("copy");
                alert("Config copied to clipboard!");
            }

            function downloadConfig() {
                const sshDir =
                    document.getElementById("sshDir").value || "~/.ssh";
                const configFile =
                    document.getElementById("configFile").value || "config";
                const content = document.getElementById("output").value;
                const blob = new Blob([content], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = configFile;
                a.click();
                URL.revokeObjectURL(url);
            }

            document
                .getElementById("sshDir")
                .addEventListener("input", generate);
            document
                .getElementById("configFile")
                .addEventListener("input", generate);

            addHost({ hostName: 'example.com', hostNameAddr: '10.6.0.7', user: 'root', port: '3241', identityFile: '~/.ssh/epicSSHKey' });
            generate();
        </script>
    </body>
</html>
